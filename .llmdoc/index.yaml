    internal/hasher/hasher.go:
        summary: Computes SHA-256 hashes of source file contents after stripping llmdoc annotation blocks, enabling change detection between runs. `StripBlock` repeatedly calls `stripOne` to remove all occurrences of text between `llmdoc:start` and `llmdoc:end` sentinels, using `comment.IsValidSentinelLine` to verify sentinels appear only on proper comment-only lines and preventing false matches when sentinel strings appear inside summary prose. `stripOne` locates the first valid block, removes the entire lines containing both sentinels (including block-comment delimiters like `/*` and `*/`), and handles multiple or malformed blocks gracefully. `ComputeHash` combines stripping and hashing into a single lowercase hex-encoded SHA-256 digest suitable for embedding in annotation headers.
