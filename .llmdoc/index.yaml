    internal/annotator/annotator.go:
        summary: Orchestrates concurrent file annotation by walking a directory, computing content hashes, and calling an LLM provider to generate summaries stored either inline (as comment headers) or in a shared index file. The `Run` function fans out work across a semaphore-bounded goroutine pool, loads the appropriate index for the active mode (mutable for index mode, read-only migration source for inline mode), and streams `Result` values through a channel. `processFile` handles all per-file logic including hash-based change detection, inline↔index migration (`StatusCleaned`, `StatusMigrated`), dry-run support, and writing updated content or index entries. Inline mode treats the file's own embedded block as the source of truth, overriding any migration index entry to prevent stale hashes from causing repeated LLM calls.
