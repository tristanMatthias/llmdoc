    internal/comment/block.go:
        summary: Defines the `Block` struct representing an llmdoc comment header (summary, content hash, model, timestamp, version) and implements `Render` and `Parse` to serialize/deserialize it. `Render` outputs the block using either block-comment (`/* * /`) or line-comment (`# `) syntax delimited by `llmdoc:start`/`llmdoc:end` sentinels, sanitizing `* /` sequences in block-comment mode and applying continuation indentation for multi-line summaries via `formatSummary`. `Parse` extracts and decodes a `Block` from raw file content, using `isSentinelCommentLine` to reject false-positive sentinel matches where sentinel strings appear inside summary text, returning `(nil, nil)` if no block is present or an error if malformed or missing the required `hash` field.
