    internal/hasher/hasher.go:
        summary: 'Computes SHA-256 hashes of source file contents after stripping llmdoc annotation blocks, enabling change detection between runs. `StripBlock` repeatedly calls `stripOne` to remove all occurrences of text between `llmdoc:start` and `llmdoc:end` sentinels, handling multiple or malformed blocks. `isCommentLine` guards against false matches by verifying sentinels appear only on lines containing comment-syntax characters (`/ * # - < ! space tab`), while `isCommentCloseAfter` validates that nothing follows the close sentinel on its line except comment-close characters, preventing false positives when sentinel strings appear inside summary prose. `ComputeHash` combines stripping and hashing into a single lowercase hex-encoded SHA-256 digest suitable for embedding in annotation headers.'
